services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infradesk
      POSTGRES_USER: infradesk
      POSTGRES_PASSWORD: infradesk
    ports:
      - "5432:5432"
    volumes:
      - infradesk_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  infradesk_pg:

